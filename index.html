<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Java Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header>
    <h1>Mit Eingaben<br>Quiz</h1>

    <div class="stats">
      <div id="progressText">Frage 0 / 0</div>
      <div id="scoreText">✔ 0 | ❌ 0</div>
    </div>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
  </header>

  <div id="quizBox">

    <div id="questionBox"></div>

    <input id="textInput" placeholder="Antwort eingeben..." autocomplete="off" />

    <button id="actionBtn">Eingabe prüfen</button>

    <div id="feedback"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
